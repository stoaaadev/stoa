<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="50%" style="stop-color:#12122a"/>
      <stop offset="100%" style="stop-color:#080810"/>
    </linearGradient>
    <linearGradient id="bGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a08030;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#f0d080;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a08030;stop-opacity:0.3"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#d4c9b0" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bannerBg)"/>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Architectural columns fading in from left -->
  <g opacity="0.12">
    <rect x="80" y="60" width="18" height="380" fill="#d4c9b0" rx="2"/>
    <rect x="140" y="60" width="18" height="380" fill="#d4c9b0" rx="2"/>
    <rect x="200" y="60" width="18" height="380" fill="#d4c9b0" rx="2"/>
    <rect x="260" y="60" width="18" height="380" fill="#d4c9b0" rx="2"/>
    <!-- Top beam -->
    <rect x="70" y="52" width="218" height="10" fill="#d4c9b0" rx="1"/>
    <!-- Bottom beam -->
    <rect x="70" y="440" width="218" height="10" fill="#d4c9b0" rx="1"/>
  </g>

  <!-- Fading columns on right -->
  <g opacity="0.08">
    <rect x="1222" y="60" width="18" height="380" fill="#d4c9b0" rx="2"/>
    <rect x="1282" y="60" width="18" height="380" fill="#d4c9b0" rx="2"/>
    <rect x="1342" y="60" width="18" height="380" fill="#d4c9b0" rx="2"/>
    <rect x="1402" y="60" width="18" height="380" fill="#d4c9b0" rx="2"/>
    <rect x="1212" y="52" width="218" height="10" fill="#d4c9b0" rx="1"/>
    <rect x="1212" y="440" width="218" height="10" fill="#d4c9b0" rx="1"/>
  </g>

  <!-- Center: STOA text -->
  <text x="750" y="280" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="160" font-weight="bold" letter-spacing="40" fill="url(#bGold)">STOA</text>

  <!-- Thin decorative lines -->
  <line x1="420" y1="320" x2="1080" y2="320" stroke="#d4c9b0" stroke-width="1" opacity="0.2"/>
  <line x1="480" y1="340" x2="1020" y2="340" stroke="#d4c9b0" stroke-width="0.5" opacity="0.15"/>

  <!-- Tagline -->
  <text x="750" y="380" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" letter-spacing="8" fill="#d4c9b0" opacity="0.5">SOLANA MULTI-AGENT SWARM</text>

  <!-- Four agent dots at bottom -->
  <circle cx="660" cy="430" r="5" fill="#f0d080" opacity="0.8"/>
  <circle cx="710" cy="430" r="5" fill="#f0d080" opacity="0.6"/>
  <circle cx="760" cy="430" r="5" fill="#f0d080" opacity="0.6"/>
  <circle cx="810" cy="430" r="5" fill="#f0d080" opacity="0.8"/>
  <line x1="665" y1="430" x2="805" y2="430" stroke="#f0d080" stroke-width="1" opacity="0.25"/>
</svg>
