<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d080"/>
      <stop offset="50%" style="stop-color:#c8a050"/>
      <stop offset="100%" style="stop-color:#a08030"/>
    </linearGradient>
    <linearGradient id="col" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8dcc8"/>
      <stop offset="100%" style="stop-color:#b0a090"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#2a2a3a" stroke-width="4"/>

  <!-- Portico / Temple structure -->
  <!-- Pediment (triangle) -->
  <polygon points="256,80 120,180 392,180" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linejoin="round"/>

  <!-- Inner pediment line -->
  <polygon points="256,105 150,175 362,175" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.5"/>

  <!-- Architrave (beam) -->
  <rect x="110" y="180" width="292" height="12" fill="url(#gold)" rx="1"/>

  <!-- Four columns -->
  <!-- Column 1 -->
  <rect x="135" y="196" width="22" height="160" fill="url(#col)" rx="2"/>
  <rect x="133" y="192" width="26" height="8" fill="url(#gold)" rx="1"/>
  <rect x="133" y="356" width="26" height="8" fill="url(#gold)" rx="1"/>

  <!-- Column 2 -->
  <rect x="210" y="196" width="22" height="160" fill="url(#col)" rx="2"/>
  <rect x="208" y="192" width="26" height="8" fill="url(#gold)" rx="1"/>
  <rect x="208" y="356" width="26" height="8" fill="url(#gold)" rx="1"/>

  <!-- Column 3 -->
  <rect x="280" y="196" width="22" height="160" fill="url(#col)" rx="2"/>
  <rect x="278" y="192" width="26" height="8" fill="url(#gold)" rx="1"/>
  <rect x="278" y="356" width="26" height="8" fill="url(#gold)" rx="1"/>

  <!-- Column 4 -->
  <rect x="355" y="196" width="22" height="160" fill="url(#col)" rx="2"/>
  <rect x="353" y="192" width="26" height="8" fill="url(#gold)" rx="1"/>
  <rect x="353" y="356" width="26" height="8" fill="url(#gold)" rx="1"/>

  <!-- Base platform -->
  <rect x="100" y="364" width="312" height="10" fill="url(#gold)" rx="1"/>
  <rect x="90" y="374" width="332" height="8" fill="url(#gold)" opacity="0.7" rx="1"/>

  <!-- "STOA" text -->
  <text x="256" y="432" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" letter-spacing="18" fill="url(#gold)">STOA</text>

  <!-- Subtle inner glow on columns -->
  <line x1="146" y1="200" x2="146" y2="352" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="221" y1="200" x2="221" y2="352" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="291" y1="200" x2="291" y2="352" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <line x1="366" y1="200" x2="366" y2="352" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
</svg>
