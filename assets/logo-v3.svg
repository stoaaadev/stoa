<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="45%" r="60%">
      <stop offset="0%" style="stop-color:#16162a"/>
      <stop offset="100%" style="stop-color:#080810"/>
    </radialGradient>
    <linearGradient id="marble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5efe0"/>
      <stop offset="50%" style="stop-color:#d4c9b0"/>
      <stop offset="100%" style="stop-color:#bfb49a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="252" fill="url(#bg3)"/>
  <circle cx="256" cy="256" r="252" fill="none" stroke="#d4c9b0" stroke-width="2" opacity="0.3"/>

  <!-- Sigma-inspired S mark — representing Stoa -->
  <g transform="translate(256, 240)">
    <!-- Top horizontal -->
    <rect x="-70" y="-100" width="140" height="14" fill="url(#marble)" rx="2"/>
    <!-- Middle horizontal -->
    <rect x="-70" y="-7" width="110" height="14" fill="url(#marble)" rx="2"/>
    <!-- Bottom horizontal -->
    <rect x="-70" y="86" width="140" height="14" fill="url(#marble)" rx="2"/>
    <!-- Left vertical -->
    <rect x="-70" y="-100" width="14" height="200" fill="url(#marble)" rx="2"/>

    <!-- Diagonal accent lines (architectural feel) -->
    <line x1="-56" y1="-86" x2="40" y2="-7" stroke="#d4c9b0" stroke-width="2" opacity="0.3"/>
    <line x1="-56" y1="7" x2="40" y2="86" stroke="#d4c9b0" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Four dots representing the four agents -->
  <circle cx="170" cy="390" r="8" fill="#d4c9b0" opacity="0.9"/>
  <circle cx="218" cy="390" r="8" fill="#d4c9b0" opacity="0.7"/>
  <circle cx="266" cy="390" r="8" fill="#d4c9b0" opacity="0.7"/>
  <circle cx="314" cy="390" r="8" fill="#d4c9b0" opacity="0.9"/>

  <!-- Connecting line between dots -->
  <line x1="178" y1="390" x2="306" y2="390" stroke="#d4c9b0" stroke-width="1.5" opacity="0.3"/>
</svg>
