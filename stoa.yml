# ============================================================
# stoa.yml — Swarm Configuration (v3)
# ============================================================
# Each agent is an autonomous unit with a role, skills, and schedule.
# Agents coordinate through the mesh (memory/mesh/) — async message
# passing via git commits. No server, no database, no cost.
#
# Runtime: GitHub Actions (free tier = 2,000 min/month)
# LLM: Claude Code CLI (configure ANTHROPIC_API_KEY in repo secrets)
# Chain: Solana (optional — configure SOLANA_RPC_URL for onchain skills)
# ============================================================

version: 3

# --- Global Settings ---
defaults:
  model: claude-sonnet-4-20250514
  chain: solana
  rpc: ${SOLANA_RPC_URL}
  gateway: direct                    # direct | bankr (for cost optimization)
  commit: true                       # auto-commit memory/mesh changes

notifications:
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
  discord:
    enabled: false
    webhook: ${DISCORD_WEBHOOK_URL}
    bot_token: ${DISCORD_BOT_TOKEN}
    channel_id: ${DISCORD_CHANNEL_ID}
  slack:
    enabled: false
    bot_token: ${SLACK_BOT_TOKEN}
    channel_id: ${SLACK_CHANNEL_ID}
    webhook: ${SLACK_WEBHOOK_URL}

# --- Health & Self-Healing Configuration ---
health:
  scoring_model: claude-haiku-3-5-20241022
  repair_cooldown_minutes: 60
  max_repairs_per_hour: 3

# --- Security Configuration ---
security:
  scan_skills: true
  tool_allowlists:
    scout: ["Read", "Write", "Edit", "Bash", "Glob", "Grep"]
    analyst: ["Read", "Write", "Edit", "Bash", "Glob", "Grep"]
    executor: ["Read", "Write", "Edit", "Bash", "Glob", "Grep"]
    guardian: ["Read", "Write", "Edit", "Bash", "Glob", "Grep"]
    researcher: ["Read", "Write", "Edit", "Bash", "Glob", "Grep", "WebFetch", "WebSearch"]
    writer: ["Read", "Write", "Edit", "Bash", "Glob", "Grep", "WebFetch", "WebSearch"]
    ops: ["Read", "Write", "Edit", "Bash", "Glob", "Grep"]
  protected_paths:
    - "src/"
    - ".github/"
    - "stoa.yml"
    - "package.json"
    - "tsconfig.json"

# --- Agent Definitions ---
agents:

  # ── Onchain Intelligence ──
  scout:
    role: "Onchain intelligence — monitors tokens, pools, whale wallets, and emerging signals on Solana"
    skills:
      - scan-tokens
      - morning-brief
      - whale-tracking
      - liquidity-scan
      - news-sentiment
      - onchain-monitor
      - social-signal
      - bridge-monitor
      - airdrop-tracker
    schedule: "*/30 * * * *"
    var:
      watch_tokens: ["SOL", "JUP", "JTO", "PYTH", "RAY", "DRIFT"]
      whale_threshold_usd: 50000
      dex: ["raydium", "orca", "meteora", "jupiter"]

  # ── Signal Processing ──
  analyst:
    role: "Signal processing — evaluates findings, scores opportunities, generates trade theses and research insights"
    skills:
      - analyze-signal
      - correlation-analysis
      - portfolio-rebalance
      - risk-scoring
      - narrative-tracker
      - market-structure
      - tokenomics-analysis
      - trend-analysis
      - trend-forecast
      - benchmark-compare
    schedule: "0 * * * *"
    triggers:
      - on: mesh
        from: scout
        type: signal
      - on: mesh
        from: researcher
        type: research
    var:
      min_confidence: 0.7
      strategy: ["momentum", "mean-reversion", "narrative"]

  # ── Trade Execution ──
  executor:
    role: "Trade execution — acts on analyst recommendations via Solana programs"
    skills:
      - execute-trade
      - dca-execute
      - stop-loss-execute
    schedule: null
    triggers:
      - on: mesh
        from: analyst
        type: trade-signal
      - on: mesh
        from: guardian
        type: stop-loss-trigger
      - on: mesh
        from: analyst
        type: dca-signal
    var:
      max_position_usd: 100
      slippage_bps: 50
      protocols: ["jupiter", "raydium"]

  # ── Risk & Self-Healing ──
  guardian:
    role: "Risk management & swarm health — monitors positions, enforces safety, heals failing skills"
    skills:
      - check-risk
      - health-check
      - self-repair
      - self-improve
      - cost-report
      - anomaly-detection
      - backup-state
      - anomaly-report
      - error-tracking
      - sla-monitor
    schedule: "*/15 * * * *"
    triggers:
      - on: mesh
        from: guardian
        type: repair-needed
    var:
      max_drawdown_pct: 15
      max_portfolio_exposure_pct: 80
      alert_on_liquidation_risk: true

  # ── Deep Research ──
  researcher:
    role: "Deep research — papers, protocols, governance, competitive intelligence, exploit analysis"
    skills:
      - arxiv-scan
      - paper-summarize
      - competitor-watch
      - github-trending
      - ecosystem-map
      - protocol-deep-dive
      - governance-tracker
      - regulatory-scan
      - tech-radar
      - patent-scan
      - funding-tracker
      - developer-activity
      - community-pulse
      - security-audit-watch
      - exploit-postmortem
    schedule: "0 */4 * * *"           # every 4 hours
    triggers:
      - on: mesh
        from: analyst
        type: research-request
    var:
      sources: ["arxiv", "github", "rss", "twitter", "farcaster"]
      max_papers_per_scan: 20
      languages: ["en"]

  # ── Content & Publishing ──
  writer:
    role: "Content creation — articles, newsletters, social posts, documentation, reports"
    skills:
      - write-article
      - write-thread
      - write-newsletter
      - daily-digest
      - weekly-recap
      - changelog-generate
      - blog-draft
      - tweet-compose
      - discord-post
      - telegram-broadcast
      - content-calendar
      - seo-optimize
      - repurpose-content
      - fact-check
      - editorial-review
      - press-release
      - case-study
      - tutorial-write
      - comparison-post
      - opinion-piece
    schedule: "0 8 * * *"            # daily at 8am
    triggers:
      - on: mesh
        from: researcher
        type: research
      - on: mesh
        from: analyst
        type: insight
    var:
      tone: "professional"
      max_article_words: 2000
      platforms: ["blog", "twitter", "telegram", "discord"]

  # ── DevOps & Automation ──
  ops:
    role: "DevOps & automation — repo health, CI monitoring, dependency audits, infrastructure management"
    skills:
      - repo-health
      - issue-triage
      - pr-review
      - dependency-audit
      - ci-monitor
      - changelog-update
      - docs-sync
      - code-quality
      - test-coverage
      - security-scan
      - performance-monitor
      - deployment-status
      - infra-cost
      - api-health
      - auto-label
      - auto-assign
      - reminder-send
      - report-schedule
      - task-prioritize
      - workflow-optimize
      - notification-digest
      - escalation-manage
      - capacity-plan
      - resource-optimize
      - batch-process
      - queue-manage
      - cleanup-routine
      - sync-external
    schedule: "0 */2 * * *"          # every 2 hours
    var:
      repos: ["stoaaadev/stoa"]
      alert_on_ci_failure: true
      max_open_issues: 50

# --- Skill Chains (Multi-step Pipelines) ---
chains:
  full-scan:
    name: "Full Market Scan Pipeline"
    steps:
      scan:
        agent: scout
        skill: scan-tokens
      analyze:
        agent: analyst
        skill: analyze-signal
        depends_on: [scan]
      risk-check:
        agent: guardian
        skill: check-risk
        depends_on: [analyze]
    on_failure: stop
    max_retries: 1

  morning-pipeline:
    name: "Morning Brief + Analysis + Digest"
    steps:
      brief:
        agent: scout
        skill: morning-brief
      research:
        agent: researcher
        skill: arxiv-scan
      analysis:
        agent: analyst
        skill: analyze-signal
        depends_on: [brief]
      digest:
        agent: writer
        skill: daily-digest
        depends_on: [brief, research, analysis]
    on_failure: continue
    max_retries: 0
    schedule: "0 8 * * *"

  research-pipeline:
    name: "Deep Research + Content Pipeline"
    steps:
      scan-papers:
        agent: researcher
        skill: arxiv-scan
      scan-github:
        agent: researcher
        skill: github-trending
      summarize:
        agent: researcher
        skill: paper-summarize
        depends_on: [scan-papers]
      write:
        agent: writer
        skill: write-newsletter
        depends_on: [summarize, scan-github]
      review:
        agent: writer
        skill: editorial-review
        depends_on: [write]
    on_failure: continue
    max_retries: 0
    schedule: "0 10 * * 1,4"         # Monday and Thursday at 10am

  weekly-maintenance:
    name: "Weekly Self-Improvement Cycle"
    steps:
      health:
        agent: guardian
        skill: health-check
      cost:
        agent: guardian
        skill: cost-report
      repo:
        agent: ops
        skill: repo-health
      deps:
        agent: ops
        skill: dependency-audit
      improve:
        agent: guardian
        skill: self-improve
        depends_on: [health, cost, repo]
      changelog:
        agent: writer
        skill: changelog-generate
        depends_on: [improve]
    on_failure: continue
    max_retries: 0
    schedule: "0 0 * * 0"

  social-pipeline:
    name: "Social Listening + Content Response"
    steps:
      listen:
        agent: scout
        skill: social-signal
      sentiment:
        agent: analyst
        skill: narrative-tracker
        depends_on: [listen]
      respond:
        agent: writer
        skill: tweet-compose
        depends_on: [sentiment]
    on_failure: continue
    max_retries: 0
    schedule: "0 */6 * * *"

  security-audit:
    name: "Security Monitoring Pipeline"
    steps:
      scan-exploits:
        agent: researcher
        skill: exploit-postmortem
      scan-audits:
        agent: researcher
        skill: security-audit-watch
      repo-scan:
        agent: ops
        skill: security-scan
      report:
        agent: guardian
        skill: anomaly-report
        depends_on: [scan-exploits, scan-audits, repo-scan]
    on_failure: continue
    max_retries: 0
    schedule: "0 6 * * *"

# --- Mesh Configuration ---
mesh:
  max_history: 100
  ttl_hours: 48

# --- Swarm Rules ---
rules:
  - "Never execute a trade without analyst confirmation (confidence >= min_confidence)"
  - "Guardian can veto any executor action by posting a halt message"
  - "All state changes must be committed to memory/ with timestamps"
  - "No agent may spend more than max_position_usd per trade"
  - "If guardian detects drawdown > max_drawdown_pct, all agents enter cooldown mode"
  - "Self-repair may only modify SKILL.md files — never src/ or .github/"
  - "Maximum 3 auto-repairs per hour to prevent repair loops"
  - "Wallet balance must be verified before any trade execution"
  - "Researcher must cite sources with URLs — no unsourced claims"
  - "Writer must fact-check before publishing to external platforms"
  - "Ops may not deploy to production without guardian approval"
