# .github/workflows/tick.yml — Cron Dispatcher
# Runs every 5 minutes. Checks which agents are due and dispatches them.
# Note: Inbound message polling runs on its own schedule via messages.yml.

name: tick

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: stoa-tick
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run dispatcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: npx tsx src/dispatch.ts

      - name: Commit state changes
        run: |
          git config user.name "stoa[bot]"
          git config user.email "stoa[bot]@users.noreply.github.com"
          git add memory/ 2>/dev/null || true
          if ! git diff --staged --quiet 2>/dev/null; then
            git commit -m 'tick: dispatch @ '"$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 2
            done
          fi
